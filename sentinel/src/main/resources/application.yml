spring:
  application:
    name: sentinel
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: sentinel-service
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      acks: all
      retries: 3
    listener:
      ack-mode: record
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

app:
  redis:
    enabled: ${REDIS_ENABLED:false}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    transaction-submitted-topic: transaction-submitted
    fraud-evaluated-topic: fraud-evaluated
  fraud:
    velocity-window-seconds: 30
    rapid-transaction-count-threshold: 5
  security:
    jwt:
      secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24=}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000} # 1 hour
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000} # 24 hours

logging:
  level:
    root: INFO
    com.satej.fraud: DEBUG
    org.springframework.kafka: INFO
