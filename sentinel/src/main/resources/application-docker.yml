spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:sentinel_db}?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:sentinel_user}
    password: ${MYSQL_PASSWORD:sentinel_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

app:
  redis:
    enabled: ${REDIS_ENABLED:true}
  kafka:
    enabled: ${KAFKA_ENABLED:true}
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}

logging:
  level:
    com.satej.fraud: INFO
